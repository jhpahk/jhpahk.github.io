career-profile:
    title: About Me
    summary: |
      <p>I am a graduate student in the <a href="https://ecse.postech.ac.kr/" target="_blank">Department of Computer Science & Engineering</a> at <a href="https://www.postech.ac.kr/eng/" target="_blank">POSTECH</a>, working as a member of the <a href="https://cvlab.postech.ac.kr/lab/" target="_blank">Computer Vision Lab</a>, advised by Prof. <a href="https://suhakwak.github.io/" target="_blank">Suha Kwak</a>.
      Previously, I completed my B.S. in ... at <a href="https://www.dgist.ac.kr/en/" target="_blank">DGIST</a>. </p>
      <p>My research lies in the areas of computer vision and deep learning, especially in the domain generalization and robust vision models. <br>
      If you are interested in my research projects, feel free to contact me via <a href="mailto:jhpahk@postech.ac.kr">email</a> or visit my <a href="https://github.com/jhpahk" target="_blank">Github</a> and <a href="https://www.linkedin.com/in/jaehyun-pahk/" target="_blank">LinkedIn</a> :) </p>

      <br> <b>[News]</b>
        - wow!

